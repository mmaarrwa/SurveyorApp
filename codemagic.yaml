workflows:
  ios-build:
    name: SurveyorApp iOS Build
    environment:
      xcode: latest
    scripts:
      - name: Build archive
        script: |
          # Build the executable and force CoreML to use Swift
          xcodebuild archive \
            -scheme "SurveyorApp" \
            -archivePath "$CM_BUILD_DIR/SurveyorApp.xcarchive" \
            -destination "generic/platform=iOS" \
            COREML_CODEGEN_LANGUAGE=Swift

      - name: Construct Manual .ipa
        script: |
          # Define paths
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          PAYLOAD_DIR="$IPA_DIR/Payload"
          
          # 1. Find the ACTUAL .app folder generated by xcodebuild archive
          # This folder contains the binary AND the compiled ML Model
          APP_SOURCE=$(find "$CM_BUILD_DIR/SurveyorApp.xcarchive/Products" -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_SOURCE" ]; then
            echo "Error: Could not find the compiled .app folder!"
            exit 1
          fi
          
          echo "Found App Bundle at: $APP_SOURCE"

          # 2. Create the Payload directory
          mkdir -p "$PAYLOAD_DIR"
          
          # 3. Copy the ENTIRE .app folder into Payload
          cp -r "$APP_SOURCE" "$PAYLOAD_DIR/"
          
          # 4. Copy the Info.plist into the .app folder just to be safe
          cp "$CM_BUILD_DIR/Info.plist" "$PAYLOAD_DIR/$(basename "$APP_SOURCE")/Info.plist"
          
          # 5. Zip it into an .ipa
          cd "$IPA_DIR"
          zip -r "SurveyorApp.ipa" "Payload"
            
    artifacts:
      - build/ios/ipa/*.ipa