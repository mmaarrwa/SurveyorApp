workflows:
  ios-build:
    name: SurveyorApp iOS Build
    environment:
      xcode: latest
    scripts:
      - name: Build archive
        script: |
          # Build the executable and force CoreML to compile
          xcodebuild archive \
            -scheme "SurveyorApp" \
            -archivePath "$CM_BUILD_DIR/SurveyorApp.xcarchive" \
            -destination "generic/platform=iOS" \
            COREML_CODEGEN_LANGUAGE=Swift

      - name: Construct Manual .ipa
        script: |
          # Define paths
          IPA_DIR="$CM_BUILD_DIR/build/ios/ipa"
          PAYLOAD_DIR="$IPA_DIR/Payload"
          APP_BUNDLE="$PAYLOAD_DIR/SurveyorApp.app"
          
          echo "Creating App Bundle Manually..."
          mkdir -p "$APP_BUNDLE"
          
          # 1. Find the binary file
          BINARY_SOURCE=$(find "$CM_BUILD_DIR/SurveyorApp.xcarchive" -name "SurveyorApp" -type f | head -n 1)
          
          if [ -z "$BINARY_SOURCE" ]; then
            echo "Error: Could not find the compiled binary!"
            exit 1
          fi
          
          echo "Found binary at: $BINARY_SOURCE"
          cp "$BINARY_SOURCE" "$APP_BUNDLE/SurveyorApp"
          
          # 2. Find the compiled CoreML model (.mlmodelc) and copy it
          MLMODEL_SOURCE=$(find "$CM_BUILD_DIR/SurveyorApp.xcarchive" -name "*.mlmodelc" -type d | head -n 1)
          
          if [ -z "$MLMODEL_SOURCE" ]; then
            echo "Warning: Could not find the compiled YOLO model!"
          else
            echo "Found ML Model at: $MLMODEL_SOURCE"
            # Copy the model folder directly into the app bundle
            cp -r "$MLMODEL_SOURCE" "$APP_BUNDLE/"
          fi
          
          # 3. Copy the Info.plist
          cp "$CM_BUILD_DIR/Info.plist" "$APP_BUNDLE/Info.plist"
          
          # 4. Zip it into an .ipa
          cd "$IPA_DIR"
          zip -r "SurveyorApp.ipa" "Payload"
            
    artifacts:
      - build/ios/ipa/*.ipa